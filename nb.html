<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НБ | ПКС 7-24</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="фото/IMG_1754.PNG">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        
        header,
        .nav,
        footer {
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 1rem;
        }
        
        header .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }
        
        header .logo h1 {
            font-size: 1.5rem;
            margin: 0;
        }
        
        nav ul {
            display: flex;
            gap: 1rem;
            list-style: none;
            padding: 0.5rem 0;
            margin: 0;
        }
        
        nav a {
            text-decoration: none;
            color: #333;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: 0.2s;
        }
        
        nav a.active,
        nav a:hover {
            background: #007bff;
            color: #fff;
        }
        
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .stat-card {
            flex: 1 1 200px;
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .stat-card h3 {
            margin: 0.5rem 0 0;
            font-size: 1.2rem;
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        
        .filters button {
            flex: 0 0 auto;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            background: #eee;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .filters button.active {
            background: #007bff;
            color: #fff;
        }
        
        .nb-day {
            background: #fff;
            margin-bottom: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        
        .nb-day-header {
            background: #007bff;
            color: #fff;
            padding: 0.75rem 1rem;
            font-weight: bold;
        }
        
        .nb-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .nb-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .nb-item:last-child {
            border-bottom: none;
        }
        
        .nb-item .student-name {
            font-weight: 500;
        }
        
        .nb-item .nb-type {
            font-weight: bold;
            color: #dc3545;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                flex-direction: column;
            }
            .nb-item {
                flex-direction: column;
                gap: 0.25rem;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <img src="фото/IMG_1754.PNG" alt="Логотип ПКС-7-24" class="site-logo" style="height:50px;">
                <div class="logo-text">
                    <h1>ПК МУКР <span>| Группа ПКС-7-24</span></h1>
                </div>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="nb.html" class="active">НБ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <h2>12</h2>
                <h3>Всего НБ</h3>
            </div>
            <div class="stat-card">
                <h2>3</h2>
                <h3>Сегодня</h3>
            </div>
            <div class="stat-card">
                <h2>5</h2>
                <h3>Неделя</h3>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="active" onclick="filterNB('all')">Все</button>
            <button onclick="filterNB('today')">Сегодня</button>
            <button onclick="filterNB('week')">Неделя</button>
            <button onclick="filterNB('month')">Месяц</button>
        </div>

        <!-- Список по дням -->
        <div class="nb-day" data-filter="today">
            <div class="nb-day-header">2 апреля 2026</div>
            <ul class="nb-list">
                <li class="nb-item"><span class="student-name">Курманбеков Ч.Э.</span> <span class="nb-type">НБ</span></li>
                <li class="nb-item"><span class="student-name">Айдай К.</span> <span class="nb-type">Опоздание</span></li>
                <li class="nb-item"><span class="student-name">Мурат А.</span> <span class="nb-type">Был</span></li>
            </ul>
        </div>

        <div class="nb-day" data-filter="week">
            <div class="nb-day-header">1 апреля 2026</div>
            <ul class="nb-list">
                <li class="nb-item"><span class="student-name">Курманбеков Ч.Э.</span> <span class="nb-type">Опоздание</span></li>
                <li class="nb-item"><span class="student-name">Айдай К.</span> <span class="nb-type">НБ</span></li>
            </ul>
        </div>

        <div class="nb-day" data-filter="month">
            <div class="nb-day-header">28 марта 2026</div>
            <ul class="nb-list">
                <li class="nb-item"><span class="student-name">Мурат А.</span> <span class="nb-type">НБ</span></li>
            </ul>
        </div>
    </main>

    <footer class="footer" style="background:#fff; border-top:1px solid #eee; padding:1rem 0; text-align:center;">
        © 2026 ПК МУКР • Группа ПКС-7-24
    </footer>

    <script>
        function filterNB(type) {
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.nb-day').forEach(day => {
                if (type === 'all') {
                    day.style.display = 'block';
                } else {
                    day.style.display = day.dataset.filter === type ? 'block' : 'none';
                }
            });
        }
    </script>

</body>

</html>

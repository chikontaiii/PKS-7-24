<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебные материалы | ПКС-7-24</title>
    <link rel="icon" type="image/png" href="фото/IMG_1754.PNG">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <img src="фото/IMG_1754.PNG" alt="Логотип ПКС-7-24" class="site-logo">
                <div class="logo-text">
                    <h1>ПК МУКР <span>| Группа ПКС-7-24</span></h1>
                    <p>Техники-Программисты</p>
                </div>
            </div>
            <div class="student-info">
                <img src="фото/photo_2025-01-13_15-42-46.jpg" alt="Фото" class="profile-pic">
                <div class="student-info-text">
                    <div class="name">Курманбеков Чынтемир</div>
                    <div class="role">Староста группы</div>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="container">
            <ul>
                <li><a href="index.html" class="active">Главная</a></li>
                <li><a href="parents.html">Родителям</a></li>
                <li><a href="study.html">Конспекты и задания</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Блок ДЗ (без кнопки добавления) -->
        <div class="homework-section fade-in" id="homework">
            <div style="margin-bottom: 2rem;">
                <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem;">📚 Домашние задания и дедлайны</h3>
            </div>
            <table class="homework-table">
                <thead>
                    <tr>
                        <th>Предмет</th>
                        <th>Задание</th>
                        <th>Дедлайн</th>
                        <th>Ответственный</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="homework-body">
                    <!-- Сюда students.js загрузит данные из Firebase -->
                </tbody>
            </table>
        </div>

        <!-- Блок конспектов (без кнопки загрузки) -->
        <div class="fade-in" id="notes">
            <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 2rem 0;">📝 Конспекты и учебные материалы</h3>
            <div class="notes-grid">
                <div class="subject-folder">
                    <h4>Программирование</h4>
                    <ul class="file-list">
                        <!-- Сюда materials.js загрузит файлы -->
                    </ul>
                </div>
                <div class="subject-folder">
                    <h4>Математика</h4>
                    <ul class="file-list"></ul>
                </div>
                <div class="subject-folder">
                    <h4>Физика</h4>
                    <ul class="file-list"></ul>
                </div>
                <!-- Если есть другие предметы, добавь аналогичные папки -->
            </div>
        </div>
    </main>

    <!-- Только скрипты для загрузки данных (без модалок) -->
    <script type="module" src="students.js"></script>
    <script type="module" src="material.js"></script>
</body>

</html>

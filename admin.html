<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Админка | ПКС-7-24</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфические стили для админки */
        
        body {
            background: #F8F7F4;
            padding: 2rem;
        }
        
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 1.5rem;
            color: #1E2B3A;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2C3E4F;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #F0F0F0;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #A51C30;
        }
        
        .btn {
            width: 100%;
        }
        /* Адаптация для мобильных */
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .admin-card {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }
            .form-group input,
            .form-group textarea,
            .form-group select {
                font-size: 1rem;
                padding: 0.7rem;
            }
        }
        
        @media (max-width: 480px) {
            .admin-card {
                padding: 1rem;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="admin-card">
            <h2>📚 Добавить домашнее задание</h2>
            <div class="form-group">
                <label>Предмет</label>
                <input type="text" id="hw-subject" placeholder="Например: Программирование">
            </div>
            <div class="form-group">
                <label>Задание</label>
                <textarea id="hw-task" rows="2" placeholder="Описание задания"></textarea>
            </div>
            <div class="form-group">
                <label>Дедлайн</label>
                <input type="date" id="hw-deadline">
            </div>
            <div class="form-group">
                <label>Ответственный (студент)</label>
                <input type="text" id="hw-responsible" placeholder="ФИО или ник">
            </div>
            <button class="btn btn-primary" onclick="addHomework()">Добавить ДЗ</button>
        </div>

        <div class="admin-card">
            <h2>⚠️ Добавить предупреждение</h2>
            <div class="form-group">
                <label>Студент</label>
                <input type="text" id="warn-student" placeholder="ФИО студента">
            </div>
            <div class="form-group">
                <label>Предупреждение / причина</label>
                <textarea id="warn-text" rows="2" placeholder="Например: Опоздание на пару"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addWarning()">Добавить предупреждение</button>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>

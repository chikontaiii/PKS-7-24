<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Админка | ПКС-7-24</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #F8F7F4;
            padding: 2rem;
        }
        
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #F0F0F0;
            border-radius: 8px;
        }
        
        .btn {
            width: 100%;
        }
        
        @media (max-width: 768px) {
            /* Исправляем контейнер */
            .container {
                padding: 0 1rem !important;
                width: 100% !important;
                overflow-x: hidden !important;
            }
            /* Шапка */
            .header-content {
                flex-direction: column !important;
                text-align: center !important;
                gap: 1rem !important;
            }
            .logo {
                flex-direction: column !important;
                text-align: center !important;
            }
            .logo h1 {
                font-size: 1.5rem !important;
                line-height: 1.3 !important;
            }
            .site-logo {
                width: 50px !important;
                margin: 0 auto !important;
            }
            /* Студенческая информация */
            .student-info {
                flex-direction: column !important;
                text-align: center !important;
                padding: 0.75rem !important;
                width: 100% !important;
            }
            .student-info-text {
                text-align: center !important;
            }
            /* Навигация - делаем прокручиваемой */
            .nav ul {
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                justify-content: flex-start !important;
                gap: 1rem !important;
                padding: 0.75rem 0 !important;
                -webkit-overflow-scrolling: touch !important;
                scrollbar-width: none !important;
                /* Firefox */
            }
            .nav ul::-webkit-scrollbar {
                display: none !important;
                /* Chrome/Safari */
            }
            .nav a {
                white-space: nowrap !important;
                font-size: 0.9rem !important;
            }
            /* Сетки - все в одну колонку */
            .dashboard-grid,
            .notes-grid,
            .parent-grid,
            .roles-grid {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }
            /* Карточки */
            .card {
                padding: 1rem !important;
            }
            .card-header h3 {
                font-size: 1.2rem !important;
            }
            /* Таблица с ДЗ - делаем прокручиваемой */
            .homework-section {
                padding: 1rem !important;
                overflow-x: auto !important;
            }
            .homework-table {
                min-width: 600px !important;
                /* Заставляем таблицу быть шире экрана */
            }
            /* Рейтинг */
            .rating-section {
                padding: 1rem !important;
            }
            .rating-row {
                grid-template-columns: 30px 1fr 60px 100px !important;
                gap: 0.5rem !important;
                font-size: 0.9rem !important;
            }
            /* Мероприятия */
            .event-item {
                flex-direction: column !important;
                gap: 0.5rem !important;
            }
            .event-date {
                text-align: left !important;
                display: flex !important;
                align-items: center !important;
                gap: 0.5rem !important;
            }
            .event-day {
                font-size: 1.5rem !important;
            }
            .event-content {
                padding-bottom: 1rem !important;
            }
            /* Родительский доступ */
            .parent-access {
                padding: 1.5rem !important;
            }
            .parent-access h3 {
                font-size: 1.5rem !important;
            }
            /* Кнопки */
            .btn {
                width: 100% !important;
                text-align: center !important;
            }
            /* Модальные окна на весь экран */
            .modal-content {
                width: 95% !important;
                padding: 1rem !important;
                margin: 0 auto !important;
            }
            .modal-content h3 {
                font-size: 1.3rem !important;
            }
            /* Исправляем отступы */
            h3[style*="font-family"] {
                font-size: 1.5rem !important;
                margin: 1.5rem 0 1rem 0 !important;
            }
            /* Убираем лишнее */
            .rating-badge {
                white-space: nowrap !important;
                font-size: 0.7rem !important;
                padding: 0.2rem 0.4rem !important;
            }
            .schedule-room {
                white-space: nowrap !important;
            }
        }
        /* Для очень маленьких телефонов (до 480px) */
        
        @media (max-width: 480px) {
            .logo h1 {
                font-size: 1.2rem !important;
            }
            .logo p {
                font-size: 0.8rem !important;
            }
            .student-info .name {
                font-size: 1rem !important;
            }
            .rating-row {
                grid-template-columns: 25px 1fr 50px 80px !important;
                font-size: 0.8rem !important;
                padding: 0.75rem 0 !important;
            }
            .event-title {
                font-size: 1rem !important;
            }
            .event-details {
                flex-wrap: wrap !important;
                gap: 0.5rem !important;
            }
            .modal-content {
                padding: 0.8rem !important;
            }
            .form-group input,
            .form-group select {
                padding: 0.5rem !important;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="admin-card">
            <h2>📚 Добавить домашнее задание</h2>
            <div class="form-group">
                <label>Предмет</label>
                <input type="text" id="hw-subject" placeholder="Например: Программирование">
            </div>
            <div class="form-group">
                <label>Задание</label>
                <textarea id="hw-task" rows="2" placeholder="Описание задания"></textarea>
            </div>
            <div class="form-group">
                <label>Дедлайн</label>
                <input type="date" id="hw-deadline">
            </div>
            <div class="form-group">
                <label>Ответственный (студент)</label>
                <input type="text" id="hw-responsible" placeholder="ФИО или ник">
            </div>
            <button class="btn btn-primary" onclick="addHomework()">Добавить ДЗ</button>
        </div>

        <div class="admin-card">
            <h2>⚠️ Добавить предупреждение</h2>
            <div class="form-group">
                <label>Студент</label>
                <input type="text" id="warn-student" placeholder="ФИО студента">
            </div>
            <div class="form-group">
                <label>Предупреждение / причина</label>
                <textarea id="warn-text" rows="2" placeholder="Например: Опоздание на пару"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addWarning()">Добавить предупреждение</button>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
